<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Adaptation System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar">
    <div class="logo">🎬 Video Adaptation <span>System</span></div>
  </header>

  <section class="upload-panel">
    <div class="upload-content">
      <h2>Upload Your Video</h2>
      <p>Process one video into Instagram, X, and YouTube outputs.</p>
      <div class="upload-row">
        <label class="choose-btn">
          📁 Choose File
          <input type="file" id="videoInput" accept="video/*" hidden />
        </label>
        <span id="fileName">No file selected</span>
      </div>
      <button id="processBtn" class="process-btn" type="button">Start Processing</button>
    </div>
  </section>

  <div id="status" class="status"></div>

  <section id="result" class="result-grid hidden">
    <article class="slot-card" data-platform="instagram">
      <h3>Instagram Output</h3>
      <video controls preload="metadata"></video>
      <a class="download-btn" download>⬇ Download Instagram Video</a>
    </article>

    <article class="slot-card" data-platform="x">
      <h3>X Output</h3>
      <video controls preload="metadata"></video>
      <a class="download-btn" download>⬇ Download X Video</a>
    </article>

    <article class="slot-card" data-platform="youtube">
      <h3>YouTube Output</h3>
      <video controls preload="metadata"></video>
      <a class="download-btn" download>⬇ Download YouTube Video</a>
    </article>
  </section>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
